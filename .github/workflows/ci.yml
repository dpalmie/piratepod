name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  python:
    name: Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - uses: extractions/setup-just@v3

      - name: Test core
        run: uv run --package piratepod-core pytest libs/py/piratepod_core

      - name: Test workers
        run: just workers-test

  rss:
    name: RSS
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/rss
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: services/rss/go.mod
          cache-dependency-path: services/rss/go.sum

      - name: Check formatting
        run: |
          files="$(gofmt -l .)"
          if [ -n "$files" ]; then
            echo "$files"
            exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

      - name: Build
        run: go build -trimpath -ldflags="-s -w" -o /tmp/rss ./cmd/rss
